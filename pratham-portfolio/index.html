<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pratham Modi - Java Full Stack Developer</title>
    <meta
      name="description"
      content="Portfolio of Pratham Modi, a Java Full Stack Developer specializing in Liferay, Spring Boot, and React."
    />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Preconnect to Google Fonts to speed up font fetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Load only the font weights actually used -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
      />
    </noscript>

    <!-- Preload the LCP hero image -->
    <link
      rel="preload"
      href="/pratham portfolio.webp"
      as="image"
      fetchpriority="high"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
